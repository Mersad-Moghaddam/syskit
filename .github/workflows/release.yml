name: Release artifacts
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: scripts/build-release.sh "${GITHUB_REF_NAME}"
      - run: scripts/build-deb.sh "${GITHUB_REF_NAME}" amd64 dist
      - run: scripts/build-deb.sh "${GITHUB_REF_NAME}" arm64 dist
      - name: Install RPM tooling
        run: sudo apt-get update && sudo apt-get install -y rpm
      - run: scripts/build-rpm.sh "${GITHUB_REF_NAME}" amd64 dist
      - run: scripts/build-rpm.sh "${GITHUB_REF_NAME}" arm64 dist
      - run: scripts/build-aur.sh "${GITHUB_REF_NAME}" dist dist
      - run: scripts/write-checksums.sh dist
      - uses: actions/upload-artifact@v4
        with:
          name: syskit-${{ github.ref_name }}
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
