name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          ungrouped="$("$(go env GOPATH)/bin/goimports" -l -local github.com/Mersad-Moghaddam/syskit .)"
          if [ -n "$ungrouped" ]; then
            echo "::error::These files have ungrouped or unformatted imports:"
            echo "$ungrouped"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests (race)
        run: go test -race ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

      - name: Benchmarks
        run: go test -run=^$ -bench=. -benchmem ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  docs:
    name: Required Artifacts & Markers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required project artifacts
        run: |
          required_files=(
            README.md
            LICENSE
            CHANGELOG.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            GOVERNANCE.md
            ARCHITECTURE.md
            docs/architecture.md
            docs/getting-started.md
            docs/command-reference.md
            docs/contributing.md
            docs/roadmap.md
            docs/developer-onboarding.md
            docs/project-structure.md
            docs/documentation-standards.md
            docs/implementation-readiness.md
            specs/product.md
            specs/architecture.md
            specs/collectors.md
            specs/rendering.md
            specs/plugin-architecture.md
            specs/cli-conventions.md
            specs/testing-strategy.md
            specs/features/system.md
            specs/features/cpu.md
            specs/features/memory.md
            specs/features/disk.md
            specs/features/filesystem.md
            specs/features/process.md
            specs/features/network.md
            specs/features/ports.md
            specs/features/diagnostics.md
            specs/features/dashboard.md
            specs/features/output-formats.md
            specs/features/plugins.md
            specs/features/containers.md
            standards/definition-of-ready.md
            standards/definition-of-done.md
            standards/naming-conventions.md
          )

          for file in "${required_files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "::error::Required project artifact is missing or empty: $file"
              exit 1
            fi
          done

      - name: Check for unresolved task markers
        run: |
          marker='TO''DO'
          if grep -RIn "$marker" README.md docs specs standards learning decisions .github -q; then
            grep -RIn "$marker" README.md docs specs standards learning decisions .github
            echo "::error::Resolve unresolved task markers before merging."
            exit 1
          fi
